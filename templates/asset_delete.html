{% extends 'base.html' %}
{% block content %}
<div class="container">
<div class="jumbotron p-3">
    <h2><b>Asset Eliminados</b><br>
        <a href="{{url_for('asset_page')}}" class="btn btn-outline-info"><i class="bi bi-arrow-left-square"></i>
            Regresar</a>
    </h2>
    <br>
    <div class="table-responsive-sm">
        <table id="tablaDelAssets" class="display" cellspacing="0" width="100%">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Nombre</th>
                    <th>Descipcion</th>
                    <th>Tipo</th>
                    <th>IP</th>
                    <th></th>
                    <th></th>

                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
</div>
</div>

{% endblock %}

{% block scripts %}

<script>
    //Arma la tabla y muestra los datos
    $(document).ready(function () {
        var table = $('#tablaDelAssets').DataTable({
            ajax: '/api/asset',
            language: { "url": "//cdn.datatables.net/plug-ins/1.11.5/i18n/es-AR.json" },
            "pageLength": 50,
            columns: [
                { data: 'id' },
                { data: 'cliente' },
                { data: 'nombre' },
                { data: 'descripcion' },
                { data: 'tipo' },
                { data: 'ip' },
                {
                    data: null,
                    className: "dt-center editor-ver",
                    defaultContent: '<i class="bi bi-search"/>',
                    orderable: false
                },
                {
                    data: null,
                    className: "dt-center editor-restore",
                    defaultContent: '<i class="bi bi-arrow-counterclockwise"/>',
                    orderable: false
                }

            ],

            //Muestra solo los que estan eliminados
            rowCallback: function (row, data, index) {
                if (data['eliminado'] == 0) {
                    $(row).hide();
                }
            }

        });

        //Ver
        $('#tablaDelAssets tbody').on('click', 'td.editor-ver', function () {
            var data = table.row($(this).parents('tr')).data();
            id = data['id'];
            $.ajax({
                url: "/asset/view/" + id + "/",
                type: "POST",
                success: function () {
                    window.location.href = "/asset/view/" + id + "/";
                }
            });
        });

        //Restaurar
        $('#tablaDelAssets tbody').on('click', 'td.editor-restore', function () {
            var data = table.row($(this).parents('tr')).data();
            id = data['id'];
            var respuesta = confirm("¿Seguro que desea restaurar el asset: " + id + " ?");
            if (respuesta) {
                $.ajax({
                    url: "/restore_asset/" + id + "/",
                    type: "POST",
                    success: function () {
                        table.ajax.reload();
                        window.location.href = "/asset";
                    }
                });

            };
        });



    });
</script>

{% endblock %}
