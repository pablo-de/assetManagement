{% extends 'base.html' %}

{% block content %}
<table id="tablaAssets" class="display" cellspacing="0" width="100%">
  <thead>
    <tr>
      <th>ID</th>
      <th>Cliente</th>
      <th>Nombre</th>
      <th>Descipcion</th>
      <th>Tipo</th>
      <th>IP</th>
      <th></th>
      <th></th>
      <th></th>

    </tr>
  </thead>
  <tbody>
  </tbody>
</table>


<!--Modal ver-->
<div id="modalVer" class="modal fade" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h4 class="modal-title">Asset: </h4>
      </div>

      <div class="modal-body">
        <form action="" method="POST">

          <input type="hidden" name="id" value="">

          <div class="form-group">
            <label>Cliente</label>

            <input type="text" class="form-control" name="cliente" id="cliente" value="" readonly>
          </div>

          <div class="form-group">
            <label>Nombre</label>
            <input type="text" class="form-control" name="nombre" id="nombre" value="" readonly>
          </div>

          <div class="form-group">
            <label>OS</label>
            <input type="text" class="form-control" name="os" id="os" value="" readonly>
          </div>

          <div class="form-group">
            <label>IP</label>
            <input type="text" class="form-control" name="ip" id="ip" value="" readonly>
          </div>

          <div class="form-group">
            <label>Hostname</label>
            <input type="text" class="form-control" name="hostname" id="hostname" value="" readonly>
          </div>

          <div class="form-group">
            <label>RAM</label>
            <input type="text" class="form-control" name="ram" id="ram" value="" readonly>
          </div>

          <div class="form-group">
            <label>CPU</label>
            <input type="text" class="form-control" name="cpu " id="cpu" value="" readonly>
          </div>

          <div class="form-group">
            <label>VGA</label>
            <input type="text" class="form-control" name="vga" id="vga" value="" readonly>
          </div>

          <div class="form-group">
            <label>Disco</label>
            <input type="text" class="form-control" name="disco" id="disco" value="" readonly>
          </div>

          <div class="form-group">
            <label>Descripción:</label>
            <input type="text" class="form-control" name="descripcion" id="descripcion" value="" readonly>
          </div>

          <div class="form-group">
            <label>Tipo:</label><br>
            <input type="text" class="form-control" name="tipo" id="tipo" value="" readonly>
          </div>

          <div class="form-group">
            <label>Comentarios:</label>
            <input type="text" class="form-control" name="comentarios" id="comentarios" value="" readonly>
          </div>

          <div class="form-group">
            <label>Creado por:</label>
            <input type="text" class="form-control" name="creador" id="creador" value="" readonly>
          </div>

          <div class="form-group">
            <label>Creado:</label>
            <input type="text" class="form-control" name="creado" id="creado" value="" readonly>
          </div>

          <div class="form-group">
            <label>Modificado:</label>
            <input type="text" class="form-control" name="modificado" id="modificado" value="" readonly>
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-dismiss="modal">Cerrar</button>
      </div>

    </div>
  </div>
</div>

{% endblock %}


<!-- Funciona -->

{% block scripts %}

<script>
  $(document).ready(function () {
    var table = $('#tablaAssets').DataTable({
      ajax: '/api/asset',
      language: { "url": "//cdn.datatables.net/plug-ins/1.11.5/i18n/es-AR.json" },
      "pageLength": 50,
      columns: [
        { data: 'id' },
        { data: 'cliente' },
        { data: 'nombre' },
        { data: 'descripcion' },
        { data: 'tipo' },
        { data: 'ip' },
        {
          data: null,
          className: "dt-center editor-ver",
          defaultContent: '<i class="bi bi-search"/>',
          orderable: false
        },
        {
          data: null,
          className: "dt-center editor-edit",
          defaultContent: '<i class="bi bi-pencil-square"/>',
          orderable: false
        },
        {
          data: null,
          className: "dt-center editor-delete",
          defaultContent: '<i class="bi bi-x-square-fill"/>',
          orderable: false
        }

      ],

      rowCallback: function (row, data, index) {
        if (data['eliminado'] == 1) {
          $(row).hide();
        }
      }

    });

    $('#tablaAssets tbody').on('click', 'td.editor-ver', function () {
      var data = table.row($(this).parents('tr')).data();

      $('#cliente').val(cliente = data['cliente']);
      $('#nombre').val(cliente = data['nombre']);
      $('#os').val(cliente = data['os']);
      $('#ip').val(cliente = data['ip']);
      $('#hostname').val(cliente = data['hostname']);
      $('#ram').val(cliente = data['ram']);
      $('#cpu').val(cliente = data['cpu']);
      $('#vga').val(cliente = data['vga']);
      $('#disco').val(cliente = data['disco']);
      $('#descripcion').val(cliente = data['descripcion']);
      $('#tipo').val(cliente = data['tipo']);
      $('#comentarios').val(cliente = data['comentarios']);
      $('#creador').val(cliente = data['creador']);
      $('#creado').val(cliente = data['creado']);
      $('#modificado').val(cliente = data['modificado']);

      $('#modalVer').modal('show');
    });

    $('#tablaAssets tbody').on('click', 'td.editor-edit', function () {
      var data = table.row($(this).parents('tr')).data();
      alert("Edit: " + data['id']);
    });

    $('#tablaAssets tbody').on('click', 'td.editor-delete', function () {
      var data = table.row($(this).parents('tr')).data();
      alert("Borrar : " + data['id']);
    });
  });
</script>

{% endblock %}
